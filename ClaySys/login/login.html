<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="form.css">
    
</head>
<body>

    <!-- Header Section with Navigation -->
    <header>
        <div class="logo">
            <img src="/phase1project/icons8-xyz-32.png" alt="Company Logo" width="50"><span>XYZ</span>
        </div>
        <nav>
            <a href="/phase1project/website.html">Home</a>
            <a href="/about/aboutus.html">About Us</a>
            
            <a href="/registration/Registratonform.html">Sign Up</a>
          
        </nav>
    </header>

    <!-- Login Form Section -->
    <div class="form-container">
        <h1>Login Form</h1>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter Email" required>
                <span class="error-message" style="display: none;"></span>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
                <span class="error-message" style="display: none;"></span>
            </div>
           
            <div class="checkbox-group">
                <input type="checkbox" checked="checked" name="remember" id="check">
                <label for="remember">Remember me</label>
            </div>
            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>
            <div class="terms">
                <p>By creating an account you agree to our <a href="#">Terms & Privacy</a>.</p>
            </div>
            <div class="submit-button">
                <button type="submit">Login</button>
            </div>
        </form>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 XYZ. All rights reserved.</p>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank">
                <img src="/phase1project/icons8-facebook-logo-48.png" alt="Facebook">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="/phase1project/icons8-twitter-48.png" alt="Twitter">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="/phase1project/icons8-linkedin-48.png" alt="LinkedIn">
            </a>
        </div>
        <p>Address: 1234 Verna, Panaji, India</p>
        <p>Phone: +91234567890 | Email: contact@xyz.com</p>
    </footer>
<script src="LoginValidation.js" ></script>
</body>
</html>
