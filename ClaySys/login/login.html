<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <!-- Header Section with Navigation -->
    <header>
        <div class="logo">
            <img src="/phase1project/icons8-xyz-32.png" alt="Company Logo" width="50">
        </div>
        <nav>
            <a href="/phase1project/website.html">Home</a>
            <a href="/about/aboutus.html">About Us</a>
            
            <a href="registration.html">Sign Up</a>
          
        </nav>
    </header>

    <!-- Login Form Section -->
    <div class="form-container">
        <h1>Login Form</h1>
        <form>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter Email" name="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" placeholder="Enter Password" name="password" required>
            </div>
            <div class="input-group">
                <label for="repeatPassword">Repeat Password</label>
                <input type="password" placeholder="Repeat Password" name="repeatPassword" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" checked="checked" name="remember" id="check">
                <label for="remember">Remember me</label>
            </div>
            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>
            <div class="terms">
                <p>By creating an account you agree to our <a href="#">Terms & Privacy</a>.</p>
            </div>
            <div class="submit-button">
                <button type="submit">Login</button>
            </div>
        </form>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Your Company Name. All rights reserved.</p>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank">
                <img src="/phase1project/icons8-facebook-logo-48.png" alt="Facebook">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="/phase1project/icons8-twitter-48.png" alt="Twitter">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="/phase1project/icons8-linkedin-48.png" alt="LinkedIn">
            </a>
        </div>
        <p>Address: 1234 Street, City, Country</p>
        <p>Phone: +1 234 567 890 | Email: contact@yourcompany.com</p>
    </footer>

</body>
</html>
