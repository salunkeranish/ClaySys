<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="Registration.css">
</head>
<body>

    <!-- Header Section with Navigation -->
    <header>
        <div class="logo">
            <img src="/phase1project/icons8-xyz-32.png" alt="Company Logo" width="50">
        </div>
        <nav>
            <a href="/phase1project/website.html">Home</a>
            <a href="/about/aboutus.html">About Us</a>
            <a href="/login/login.html">Sign In</a>
           
           
        </nav>
    </header>

    <!-- Registration Form Section -->
    <div class="form-container">
        <h2>Sign Up</h2>
        <form id="registrationForm">
            <!-- First Name and Last Name -->
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required>
            </div>

            <!-- Date of Birth and Age -->
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" required>
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="Male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="Female" required>
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="Other" required>
                    <label for="other">Other</label>
                </div>
            </div>

            <!-- Phone Number and Email Address -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" required>
            </div>

            <!-- State and City -->
            <div class="form-group">
                <label for="state">State</label>
                <select id="state" required>
                    <option value="">Select State</option>
                    <option value="Goa">Goa</option>
                    <option value="Karnataka">Karnataka</option>
                </select>
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <select id="city" required>
                    <option value="">Select City</option>
                    <option value="Panjim">Panjim</option>
                    <option value="Bangalore">Bangalore</option>
                    <option value="Karwar">Karwar</option>
                </select>
            </div>

            <!-- Username and Password -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>

            <!-- Submit Button -->
            <div class="form-actions">
                <button type="submit">Register</button>
            </div>
        </form>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Your Company Name. All rights reserved.</p>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank">
                <img src="/phase1project/icons8-facebook-logo-48.png" alt="Facebook">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="/phase1project/icons8-twitter-48.png" alt="Twitter">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="/phase1project/icons8-linkedin-48.png" alt="LinkedIn">
            </a>
        </div>
        <p>Address: 1234 Street, City, Country</p>
        <p>Phone: +1 234 567 890 | Email: contact@yourcompany.com</p>
    </footer>

</body>
</html>
